num_clients: 2
num_epochs: 1
batch_size: 64
clients_per_round: 1
learning_rate: 0.01
num_rounds: 2
partitioning: iid
dataset_name: code15
dataset_seed: 42
alpha: 0.5
similarity: 1.0
labels_per_client: 2
momentum: 0.9
weight_decay: 1.0e-05
client_fn:
  _target_: niid_bench.client_fedavg.gen_client_fn
  _recursive_: false
  num_epochs: ${num_epochs}
  learning_rate: ${learning_rate}
  momentum: ${momentum}
  weight_decay: ${weight_decay}
dataset:
  name: ${dataset_name}
  partitioning: ${partitioning}
  batch_size: ${batch_size}
  val_split: 0.3
  seed: ${dataset_seed}
  alpha: ${alpha}
  labels_per_client: ${labels_per_client}
model:
  _target_: niid_bench.models.ResNet1d
  n_classes: 1
strategy:
  _target_: flwr.server.strategy.FedAvg
  fraction_fit: 1.0e-05
  fraction_evaluate: 0.0
  min_fit_clients: ${clients_per_round}
  min_available_clients: ${clients_per_round}
  min_evaluate_clients: 1
client: null
server_device: cuda
client_resources:
  num_cpus: 32
  num_gpus: 4
